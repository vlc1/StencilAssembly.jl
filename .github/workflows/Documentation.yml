name: Documentation
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
permissions:
  contents: write
  pull-requests: read
  statuses: write
jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: StencilAssembly
      # StencilCore is unregistered; check it out as a sibling so the docs
      # `[sources]` path (../../StencilCore) resolves.
      - uses: actions/checkout@v6
        with:
          repository: vlc1/StencilCore.jl
          path: StencilCore
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Build and deploy docs
        working-directory: StencilAssembly
        run: |
          julia --project=docs -e 'using Pkg; Pkg.instantiate()'
          julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
